name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck daemon
        run: npx tsc --noEmit -p apps/daemon/tsconfig.json

      - name: Typecheck dashboard
        run: npx tsc --noEmit -p apps/dashboard/tsconfig.json

      - name: Test daemon
        run: npm -w apps/daemon run test

      - name: Build daemon
        run: npm -w apps/daemon run build

      - name: Build dashboard
        run: npm -w apps/dashboard run build

  desktop-smoke:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        run: npm ci

      - name: Stage desktop runtime
        run: npm run desktop:prepare

      - name: Run desktop smoke test
        run: npm run desktop:smoke
