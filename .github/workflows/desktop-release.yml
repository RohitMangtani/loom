name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        run: npm ci

      - name: Stage desktop runtime
        run: npm run desktop:prepare

      - name: Run desktop smoke test
        run: npm run desktop:smoke

      - name: Build signed DMG draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: Hive Desktop ${{ github.ref_name }}
          releaseBody: |
            macOS desktop wrapper build for Hive.
            This release packages the existing daemon and dashboard behind the Tauri shell.
          releaseDraft: true
          prerelease: true
