<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="54%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <radialGradient id="haloA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(264.0 115.2) rotate(32) scale(288.0 144.0)">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(984.0 604.8) rotate(18) scale(264.0 129.6)">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shell" x1="24" y1="120" x2="1176" y2="688" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1324"/>
      <stop offset="100%" stop-color="#08101c"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#94a3b8" stroke-opacity="0.08"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.62"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.24"/>
    </filter>
  </defs>
  <style>
    text {
      font-family: "SF Pro Display", "SF Pro Text", Inter, Arial, sans-serif;
    }
  </style><rect x="0" y="0" width="1200" height="720" rx="24" fill="url(#bg)"/><rect x="0" y="0" width="1200" height="720" rx="24" fill="url(#grid)"/><ellipse cx="264.0" cy="115.2" rx="288.0" ry="144.0" fill="url(#haloA)"/><ellipse cx="984.0" cy="604.8" rx="264.0" ry="129.6" fill="url(#haloB)"/><rect x="36" y="24" width="116" height="28" rx="14.0" fill="#0f2748" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.45"/><text x="94.0" y="42.0" font-size="10" font-weight="700" fill="#bae6fd" text-anchor="middle" letter-spacing="0.16em">LOOM STACK</text><text x="36" y="82" font-size="40" font-weight="700" fill="#f8fafc">One stack, kept readable</text><text x="36" y="110" font-size="13" font-weight="500" fill="#94a3b8">Cleaner diagram, shorter labels, and no text drifting out of frame.</text><g filter="url(#shadow)"><rect x="46" y="158" width="1108" height="520" rx="30" fill="url(#shell)" stroke="#1e293b" stroke-width="1.1"/></g><rect x="74" y="194" width="316" height="432" rx="72.0" fill="#0f2748" stroke="#38bdf8" stroke-width="1.2"/><text x="92" y="220" font-size="16" font-weight="700" fill="#e0f2fe">1. Physical stack</text><text x="92" y="240" font-size="10" font-weight="500" fill="#bae6fd">Window order is the first truth.</text><text x="92" y="254" font-size="10" font-weight="400" fill="#bae6fd">Top stays top.</text><rect x="96" y="286" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="118" y="310" font-size="9" font-weight="700" fill="#f8fafc">Q1</text><text x="202" y="310" font-size="8.8" font-weight="500" fill="#cbd5e1">Review</text><rect x="96" y="344" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="118" y="368" font-size="9" font-weight="700" fill="#f8fafc">Q2</text><text x="202" y="368" font-size="8.8" font-weight="500" fill="#cbd5e1">Active</text><rect x="96" y="402" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="118" y="426" font-size="9" font-weight="700" fill="#f8fafc">Q3</text><text x="202" y="426" font-size="8.8" font-weight="500" fill="#cbd5e1">Waiting</text><rect x="96" y="460" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="118" y="484" font-size="9" font-weight="700" fill="#f8fafc">Q4</text><text x="202" y="484" font-size="8.8" font-weight="500" fill="#cbd5e1">Open slot</text><rect x="442" y="194" width="316" height="432" rx="72.0" fill="#0c2a23" stroke="#34d399" stroke-width="1.2"/><text x="460" y="220" font-size="16" font-weight="700" fill="#d1fae5">2. Mirrored deck</text><text x="460" y="240" font-size="10" font-weight="500" fill="#a7f3d0">The same stack appears on every screen.</text><text x="460" y="254" font-size="10" font-weight="400" fill="#a7f3d0">That keeps routing fast.</text><rect x="464" y="286" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="486" y="310" font-size="9" font-weight="700" fill="#f8fafc">Desktop</text><text x="570" y="310" font-size="8.8" font-weight="500" fill="#cbd5e1">Stack list</text><rect x="464" y="344" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="486" y="368" font-size="9" font-weight="700" fill="#f8fafc">Phone</text><text x="570" y="368" font-size="8.8" font-weight="500" fill="#cbd5e1">Same order</text><rect x="464" y="402" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="486" y="426" font-size="9" font-weight="700" fill="#f8fafc">Alert</text><text x="570" y="426" font-size="8.8" font-weight="500" fill="#cbd5e1">Next move</text><rect x="810" y="194" width="316" height="432" rx="72.0" fill="#31230e" stroke="#f59e0b" stroke-width="1.2"/><text x="828" y="220" font-size="16" font-weight="700" fill="#fde68a">3. Control layer</text><text x="828" y="240" font-size="10" font-weight="500" fill="#fcd34d">Routing, status, and memory sit behind the view.</text><text x="828" y="254" font-size="10" font-weight="400" fill="#fcd34d">The product is the visible stack.</text><rect x="832" y="286" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="854" y="310" font-size="9" font-weight="700" fill="#f8fafc">Routing</text><text x="938" y="310" font-size="8.8" font-weight="500" fill="#cbd5e1">Direct the right worker</text><rect x="832" y="344" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="854" y="368" font-size="9" font-weight="700" fill="#f8fafc">Status</text><text x="938" y="368" font-size="8.8" font-weight="500" fill="#cbd5e1">Read the state fast</text><rect x="832" y="402" width="272" height="42" rx="18" fill="#08141d" stroke="#334155" stroke-width="1"/><text x="854" y="426" font-size="9" font-weight="700" fill="#f8fafc">Memory</text><text x="938" y="426" font-size="8.8" font-weight="500" fill="#cbd5e1">Carry learnings forward</text><line x1="390" y1="404" x2="442" y2="404" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 6"/><path d="M442 404L434.8 407.5L434.8 400.5Z" fill="#334155"/><line x1="758" y1="404" x2="810" y2="404" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 6"/><path d="M810 404L802.8 407.5L802.8 400.5Z" fill="#334155"/><text x="600" y="652" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">Loom works when the stack stays readable, not when every card tries to explain everything.</text></svg>
