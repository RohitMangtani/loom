<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#111114"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <rect width="1200" height="720" rx="18" fill="url(#bg)" stroke="#e7e5e4" stroke-width="1"/>

  <text x="600" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#1c1917" letter-spacing="0.08em">HIVE NOW RUNS AS A STACK</text>
  <text x="600" y="68" text-anchor="middle" font-size="12" fill="#57534e">The dashboard mirrors the vertical order of your terminal windows. Q2's current chat-history patch is easy to spot mid-stack.</text>

  <rect x="40" y="110" width="332" height="430" rx="22" fill="url(#darkPanel)"/>
  <text x="68" y="146" font-size="16" font-weight="700" fill="#fafaf9">1. Terminal windows</text>
  <text x="68" y="168" font-size="11" fill="#a1a1aa">The daemon sorts them by screen position, top to bottom.</text>

  <rect x="68" y="206" width="276" height="58" rx="14" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <circle cx="90" cy="235" r="6" fill="#ef4444"/>
  <text x="106" y="229" font-size="11" font-weight="700" fill="#f8fafc">Q1  Claude</text>
  <text x="106" y="246" font-size="9" fill="#cbd5e1">rmgtni-web  pushed article update</text>

  <rect x="68" y="278" width="276" height="88" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="90" cy="310" r="6" fill="#22c55e"/>
  <text x="106" y="304" font-size="11" font-weight="700" fill="#f0fdf4">Q2  Claude</text>
  <text x="106" y="321" font-size="9" fill="#dcfce7">hive  chat history patch in progress</text>
  <text x="106" y="339" font-size="8.6" fill="#86efac">apps/daemon/src/session-stream.ts</text>
  <text x="106" y="354" font-size="8.6" fill="#86efac">MAX_HISTORY  50 to 200</text>

  <rect x="68" y="380" width="276" height="58" rx="14" fill="#172554" stroke="#2563eb" stroke-width="1"/>
  <circle cx="90" cy="409" r="6" fill="#3b82f6"/>
  <text x="106" y="403" font-size="11" font-weight="700" fill="#eff6ff">Q3  Codex</text>
  <text x="106" y="420" font-size="9" fill="#bfdbfe">article and GitHub diagram refresh</text>

  <rect x="68" y="452" width="276" height="58" rx="14" fill="#111113" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="90" cy="481" r="6" fill="#71717a"/>
  <text x="106" y="475" font-size="11" font-weight="700" fill="#e4e4e7">Slot 4  OFFLINE</text>
  <text x="106" y="492" font-size="9" fill="#a1a1aa">spawn another worker when you need it</text>

  <text x="206" y="570" text-anchor="middle" font-size="11" font-weight="600" fill="#a1a1aa">The stack is the interface.</text>
  <text x="206" y="588" text-anchor="middle" font-size="9.5" fill="#71717a">You remember positions faster than names.</text>

  <line x1="390" y1="320" x2="456" y2="320" stroke="#a8a29e" stroke-width="2"/>
  <polygon points="446,312 462,320 446,328" fill="#a8a29e"/>
  <text x="424" y="298" text-anchor="middle" font-size="11" fill="#78716c">mirrors 1:1</text>

  <rect x="484" y="110" width="332" height="430" rx="22" fill="url(#darkPanel)"/>
  <text x="512" y="146" font-size="16" font-weight="700" fill="#fafaf9">2. Dashboard stack</text>
  <text x="512" y="168" font-size="11" fill="#a1a1aa">Same order on your phone, second monitor, or laptop.</text>

  <rect x="574" y="194" width="152" height="280" rx="34" fill="#111827" stroke="#334155" stroke-width="1"/>
  <rect x="628" y="208" width="44" height="8" rx="4" fill="#334155"/>
  <rect x="594" y="230" width="112" height="24" rx="12" fill="#0f172a"/>
  <text x="650" y="246" text-anchor="middle" font-size="10" font-weight="700" fill="#fafaf9">HIVE</text>

  <rect x="594" y="272" width="112" height="34" rx="12" fill="#ef4444" fill-opacity="0.16" stroke="#ef4444" stroke-width="1"/>
  <text x="610" y="290" font-size="8.8" font-weight="700" fill="#fecaca">Q1</text>
  <text x="636" y="290" font-size="8.4" fill="#fee2e2">idle after push</text>

  <rect x="594" y="316" width="112" height="48" rx="12" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-width="1.4"/>
  <text x="610" y="336" font-size="8.8" font-weight="700" fill="#86efac">Q2</text>
  <text x="636" y="336" font-size="8.4" fill="#dcfce7">history fix</text>
  <text x="636" y="350" font-size="7.6" fill="#bbf7d0">50 to 200 entries</text>

  <rect x="594" y="374" width="112" height="34" rx="12" fill="#3b82f6" fill-opacity="0.16" stroke="#3b82f6" stroke-width="1"/>
  <text x="610" y="392" font-size="8.8" font-weight="700" fill="#93c5fd">Q3</text>
  <text x="636" y="392" font-size="8.4" fill="#dbeafe">diagram refresh</text>

  <rect x="594" y="418" width="112" height="34" rx="12" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <text x="610" y="436" font-size="8.8" font-weight="700" fill="#d4d4d8">OFFLINE</text>
  <text x="636" y="436" font-size="8.4" fill="#a1a1aa">open slot</text>

  <path d="M718 340 C784 340 790 278 864 278" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 5"/>
  <polygon points="852,270 872,276 856,288" fill="#22c55e"/>

  <rect x="852" y="222" width="302" height="112" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
  <text x="876" y="252" font-size="14" font-weight="700" fill="#f0fdf4">What changed</text>
  <text x="876" y="278" font-size="11" fill="#bbf7d0">Q2 is no longer a generic tile in a grid.</text>
  <text x="876" y="296" font-size="11" fill="#bbf7d0">It is the second worker in a live stack, and the current</text>
  <text x="876" y="314" font-size="11" fill="#bbf7d0">action is visible enough to route real work around it.</text>

  <line x1="846" y1="352" x2="1154" y2="352" stroke="#d6d3d1" stroke-width="1"/>

  <rect x="852" y="372" width="302" height="138" rx="18" fill="white" stroke="#e7e5e4" stroke-width="1"/>
  <text x="876" y="402" font-size="14" font-weight="700" fill="#1c1917">Why the stack matters</text>
  <text x="876" y="428" font-size="11" fill="#57534e">See the second tile go green.</text>
  <text x="876" y="446" font-size="11" fill="#57534e">Read that it is the chat-history fix.</text>
  <text x="876" y="464" font-size="11" fill="#57534e">Send one message if it drifts or blocks.</text>
  <text x="876" y="482" font-size="11" fill="#57534e">Let the daemon handle routing, telemetry, and memory.</text>

  <line x1="48" y1="620" x2="1152" y2="620" stroke="#e7e5e4" stroke-width="1"/>
  <text x="600" y="648" text-anchor="middle" font-size="12" fill="#78716c">The public surface should match the product: stacked workers, live actions, and visible routing.</text>
  <text x="600" y="674" text-anchor="middle" font-size="14" font-weight="700" fill="#1c1917">One screen. One stack. Any number of agents.</text>
</svg>
